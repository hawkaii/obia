version: 2

before:
  hooks:
    - go mod tidy

gomod:
  proxy: true
  env:
    - GOPROXY=https://proxy.golang.org,direct
    - GOSUMDB=sum.golang.org

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
      - "386"
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm
    ldflags:
      - -s -w
      - -X github.com/hawkaii/obia/internal/version.Version={{.Version}}
      - -X github.com/hawkaii/obia/internal/version.Commit={{.Commit}}
      - -X github.com/hawkaii/obia/internal/version.Date={{.CommitDate}}

archives:
  - formats:
      - binary
    name_template: "obia_{{ .Tag }}_{{ .Os }}-{{ .Arch }}{{if .Arm}}_{{.Arm}}{{end}}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^test:"
      - "^chore"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy
  groups:
    - title: "New Features"
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 100
    - title: "Bug Fixes"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 200
    - title: "Documentation"
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 300
    - title: Other
      order: 9999

release:
  header: |
    # {{ .Version }}

  footer: |
    ---

    **Install**

    ```bash
    go install github.com/hawkaii/obia@latest
    ```

    Or download a binary below.
